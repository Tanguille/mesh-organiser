[package]
name = "libmeshthumbnail"
version = "0.1.0"
edition = "2024"

[lints.clippy]
# Priority is needed so our config below is respected over the pedantic group
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
redundant_clone = "warn"
style = "warn"
unnecessary_self_imports = "warn"

[dependencies]
euc = { git = "https://github.com/zesterer/euc", rev = "e8f7aeec9ff431b373f83de2c773ddf8a2a3ec4d" }
vek = "0.17.2"
image = "0.25.10"
stl_io = "0.10.0"
thiserror = "2.0.18"
zip = "8.2.0"
wavefront_obj = { version = "11.0.0" }
threemf = { git = "https://github.com/suchmememanyskill/3mf-rs", rev = "d78e731b2fcf127692380332ad2708aec65dee68" }
regex = "1.12.3"
base64 = "0.22.1"
opencascade = { git = "https://github.com/bschwind/opencascade-rs", rev = "09b2614613a88e21267be656992212c87df96805", optional = true }
tempfile = "3.27.0"

[features]
step = ["dep:opencascade"]
