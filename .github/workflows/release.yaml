name: publish

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: 'Release type'
        required: true
        default: 'publish'
        type: choice
        options:
          - publish
          - draft
          - build-only
  push:
    tags:
      - "v*"

env:
  MESH_THUMBNAIL_REPO: suchmememanyskill/mesh-thumbnail

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: win-amd64
            target: x86_64-pc-windows-gnu
            os: windows-latest
            args: ""
          - name: linux-amd64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            args: ""
          - name: macos-amd64
            target: x86_64-apple-darwin
            os: macos-latest
            args: "--target x86_64-apple-darwin"
          - name: macos-arm64
            target: aarch64-apple-darwin
            os: macos-latest
            args: "--target aarch64-apple-darwin"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: current
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2
        with:
          shared-key: release

      - name: Install dependencies (Ubuntu)
        if: matrix.name == 'linux-amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies (macOS)
        if: matrix.name == 'macos-amd64' || matrix.name == 'macos-arm64'
        run: |
          brew uninstall cmake
          brew tap-new $USER/local-cmake
          brew tap homebrew/core --force
          brew extract --version=3.31.1 cmake $USER/local-cmake
          brew install $USER/local-cmake/cmake@3.31.1

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute release settings
        id: release-settings
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: use inputs
            if [ "${{ github.event.inputs.releaseType }}" = "build-only" ]; then
              echo "tag_name=" >> $GITHUB_OUTPUT
              echo "release_name=" >> $GITHUB_OUTPUT
              echo "upload_workflow_artifacts=true" >> $GITHUB_OUTPUT
              echo "release_draft=false" >> $GITHUB_OUTPUT
            else
              echo "tag_name=v__VERSION__" >> $GITHUB_OUTPUT
              echo "release_name=Mesh Organiser v__VERSION__" >> $GITHUB_OUTPUT
              echo "upload_workflow_artifacts=false" >> $GITHUB_OUTPUT
              if [ "${{ github.event.inputs.releaseType }}" = "draft" ]; then
                echo "release_draft=true" >> $GITHUB_OUTPUT
              else
                echo "release_draft=false" >> $GITHUB_OUTPUT
              fi
            fi
          else
            # Tag push: use the tag directly
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "release_name=Mesh Organiser ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "upload_workflow_artifacts=false" >> $GITHUB_OUTPUT
            echo "release_draft=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.release-settings.outputs.tag_name }}
          releaseName: ${{ steps.release-settings.outputs.release_name }}
          releaseBody: "See the assets to download this version and install."
          releaseDraft: ${{ steps.release-settings.outputs.release_draft }}
          prerelease: false
          uploadWorkflowArtifacts: ${{ steps.release-settings.outputs.upload_workflow_artifacts }}
          args: ${{ matrix.args }}
