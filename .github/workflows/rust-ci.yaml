name: Rust CI

on:
  push:
    branches:
      - main
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/rust-ci.yaml"

  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/rust-ci.yaml"

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_check:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - run: cargo fmt --all -- --check
      - name: Detect unused dependencies
        uses: bnjbvr/cargo-machete@ac30a525c0a8d163a92d727b3ff079ee3f6ecb08 # v0.9.2

      # src-tauri ships `step`, so feature unification builds and tests the STEP
      # path in these workspace runs. On Linux this compiles OCCT from source via
      # cadrum (~30 min uncached; cached in the cargo target dir afterwards) — see
      # libmeshthumbnail/Cargo.toml for why Linux cannot use the prebuilt tarball.
      - run: cargo build --workspace --all-targets
      - run: cargo clippy --workspace --all-targets
      - run: cargo test --workspace --all-targets
