name: Svelte CI

on:
  push:
    branches:
      - main
    paths:
      - "**/*.svelte"
      - "**/*.ts"
      - "**/*.js"
      - "**/*.css"
      - "**/package.json"
      - "**/pnpm-lock.yaml"
      - "**/*.config.*"
      - "Cargo.toml"
      - "scripts/check-package-cargo-version.mjs"
      - ".github/workflows/svelte-ci.yaml"

  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.svelte"
      - "**/*.ts"
      - "**/*.js"
      - "**/*.css"
      - "**/package.json"
      - "**/pnpm-lock.yaml"
      - "**/*.config.*"
      - "Cargo.toml"
      - "scripts/check-package-cargo-version.mjs"
      - ".github/workflows/svelte-ci.yaml"

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  svelte_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify package.json matches Cargo workspace version
        run: node scripts/check-package-cargo-version.mjs

      - name: Install pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Svelte check
        run: pnpm run check

      - name: Prettier check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Build frontend
        run: pnpm run build
