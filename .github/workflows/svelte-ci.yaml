name: Svelte CI

on:
  push:
    branches:
      - main
    paths:
      - "**/*.svelte"
      - "**/*.ts"
      - "**/*.js"
      - "**/*.css"
      - "**/package.json"
      - "**/pnpm-lock.yaml"
      - "**/*.config.*"
      - "Cargo.toml"
      - "scripts/check-package-cargo-version.mjs"
      - ".github/workflows/svelte-ci.yaml"

  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.svelte"
      - "**/*.ts"
      - "**/*.js"
      - "**/*.css"
      - "**/package.json"
      - "**/pnpm-lock.yaml"
      - "**/*.config.*"
      - "Cargo.toml"
      - "scripts/check-package-cargo-version.mjs"
      - ".github/workflows/svelte-ci.yaml"

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  svelte_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify package.json matches Cargo workspace version
        run: node scripts/check-package-cargo-version.mjs

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Svelte check
        run: pnpm run check

      - name: Prettier check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Build frontend
        run: pnpm run build
