name: force-build

on: workflow_dispatch

env:
  MESH_THUMBNAIL_REPO: suchmememanyskill/mesh-thumbnail

jobs:
  build-tauri:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: win-amd64
            target: x86_64-pc-windows-gnu
            os: windows-latest
            args: ""
          - name: linux-amd64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            args: ""
          - name: macos-amd64
            target: x86_64-apple-darwin
            os: macos-latest
            args: "--target x86_64-apple-darwin"
          - name: macos-arm64
            target: aarch64-apple-darwin
            os: macos-latest
            args: "--target aarch64-apple-darwin"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: current
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: force-build

      - name: Install dependencies (Ubuntu)
        if: matrix.name == 'linux-amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies (macOS)
        if: matrix.name == 'macos-amd64' || matrix.name == 'macos-arm64'
        run: |
          brew uninstall cmake
          brew tap-new $USER/local-cmake
          brew tap homebrew/core --force
          brew extract --version=3.31.1 cmake $USER/local-cmake
          brew install $USER/local-cmake/cmake@3.31.1

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # action-v0.6.1
        with:
          args: ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tauri-build-${{ matrix.name }}
          path: ${{ steps.tauri-build.outputs.artifactPaths }}
          if-no-files-found: error
