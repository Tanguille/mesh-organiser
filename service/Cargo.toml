[package]
name = "service"
version = "0.1.0"
edition = "2024"

[features]
step = ["libmeshthumbnail/step"]

[dependencies]
libmeshthumbnail = { path = "../libmeshthumbnail" }
base64 = { workspace = true }
content_disposition = { workspace = true }
db = { workspace = true }
euc = { workspace = true }
futures = { workspace = true }
image = { workspace = true, features = ["png", "jpeg"] }
indexmap = { workspace = true }
itertools = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
stl_io = { workspace = true }
strum = { workspace = true, features = ["derive"] }
tempfile = { workspace = true }
thiserror = { workspace = true }
threemf = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread"] }
tokio-util = { workspace = true, features = ["io"] }
urlencoding = { workspace = true }
vek = { workspace = true }
wavefront_obj = { workspace = true }
zip = { workspace = true }

async_zip = { workspace = true, features = [
    "deflate",
    "deflate64",
    "tokio-fs",
] }
chrono = { workspace = true }

[target.'cfg(windows)'.dependencies]
winreg = "0.55.0"
