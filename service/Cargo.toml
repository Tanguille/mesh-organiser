[package]
name = "service"
version = "0.1.0"
edition = "2024"

[features]
step = ["libmeshthumbnail/step"]

[dependencies]
db = { workspace = true }

libmeshthumbnail = { path = "../libmeshthumbnail" }
content_disposition = { workspace = true }
futures = { workspace = true }
image = { workspace = true, features = ["png", "jpeg"] }
indexmap = { workspace = true }
itertools = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
stl_io = { workspace = true }
strum = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
threemf = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread"] }
tokio-util = { workspace = true, features = ["io"] }
urlencoding = { workspace = true }
vek = { workspace = true }
async_zip = { workspace = true, features = [
    "deflate",
    "deflate64",
    "tokio-fs",
] }
chrono = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
wiremock = "0.6.5"

[target.'cfg(windows)'.dependencies]
winreg = { workspace = true }
